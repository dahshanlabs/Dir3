kind = "web"
previewPath = "/"
title = "Dir3 / درع — AI Security Platform"
version = "1.0.0"
id = "artifacts/dir3-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19032

[services.development]
run = "pnpm --filter @workspace/dir3-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dir3-web", "run", "build" ]
publicDir = "artifacts/dir3-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19032"
BASE_PATH = "/"
